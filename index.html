<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindSort</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  <h1>✨ Clear your mind in seconds</h1>
  <p class="subtitle">Dump your thoughts and organize them simply.</p>

  <textarea placeholder="Write your thoughts here..."></textarea>

  <div class="results">
    <div class="box">
      <h3>✅ Tasks</h3>
      <ul>
        <li>Finish homework</li>
        <li>Clean room</li>
      </ul>
    </div>

    <div class="box">
      <h3>💡 Ideas</h3>
      <ul>
        <li>Build a portfolio website</li>
      </ul>
    </div>

    <div class="box">
      <h3>⏰ Reminders</h3>
      <ul>
        <li>Call mom at 6pm</li>
      </ul>
    </div>
  </div>
</div>

</body>
</html>
